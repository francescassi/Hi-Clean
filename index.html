<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Bluetooth Printer Test</title>
</head>
<body>

<button onclick="connectPrinter()">Connect Printer</button>

<script>
async function connectPrinter() {
  try {
    const device = await navigator.bluetooth.requestDevice({
      acceptAllDevices: true,
      optionalServices: []
    });

    alert("Terhubung ke: " + device.name);
    console.log(device);

  } catch (err) {
    console.error(err);
    alert("Gagal: " + err.message);
  }
}
</script>

</body>
</html>
